<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Climat Monitor</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
    <div class="dashboard">
        <h1>📊 Climat Monitor 📊</h1>
        <div class="device-info" id="device">device: --</div>
        <div class="status" id="status">🔄 Connecting...</div>
        
        <div class="grid">
            <div class="card">
                <div class="card-title">Temperature</div>
                <div>
                    <span class="card-value" id="temp">--</span>
                    <span class="card-unit">°C</span>
                </div>
                <div class="timestamp" id="temp-time"></div>
            </div>
            
            <div class="card">
                <div class="card-title">Humidity</div>
                <div>
                    <span class="card-value" id="hum">--</span>
                    <span class="card-unit">%</span>
                </div>
                <div class="timestamp" id="hum-time"></div>
            </div>
        </div>
        
        <div class="raw-data" id="raw">
            Waiting for data...
        </div>
    </div>
    <footer class="footer">
            contact with the owner
            ciclos52582@gmail.com
            or Telegram
            @rendich76
    </footer>

    <script>
    const VPS_IP = "91.199.154.71";
    const INF_TOPIC = "esp32/sensors";
    const MQTT_USER = "esp32"; 
    const MQTT_PASSWORD = "esp32password"; 
    
    // CHANGED: use wss:// and /mqtt path instead of direct connection to port 9001
    // Also automatically determine the host so it works with both IP and domain
    const brokerUrl = `wss://${window.location.hostname}/mqtt`;
    
    console.log('Attempting to connect to:', brokerUrl);
    console.log('Website protocol:', window.location.protocol);

    const client = mqtt.connect(brokerUrl, {
        keepalive: 60,
        clean: false,        // Important! Preserve session
        reconnectPeriod: 1000,
        connectTimeout: 30 * 1000,
        username: MQTT_USER,
        password: MQTT_PASSWORD,
        clientId: 'web_monitor_' + Math.random().toString(16).substr(2, 8), // Unique ID
        // ADDED: for WebSocket via proxy
        rejectUnauthorized: false
    });

    // Variable to store the latest received data
    let lastData = null;
    let lastDataTime = null;

    // Function to display data (even if from cache)
    function displayData(data, time) {
        if (data.device) {
            document.getElementById('device').innerHTML = `📱 Device: ${data.device}`;
        }
        
        if (data.temperature !== undefined) {
            document.getElementById('temp').textContent = data.temperature;
            document.getElementById('temp-time').textContent = `⏱️ ${time}`;
        }
        
        if (data.humidity !== undefined) {
            document.getElementById('hum').textContent = data.humidity;
            document.getElementById('hum-time').textContent = `⏱️ ${time}`;
        }
    }

    // Function to load saved data from localStorage
    function loadCachedData() {
        try {
            const cached = localStorage.getItem('lastSensorData');
            const cachedTime = localStorage.getItem('lastSensorTime');
            
            if (cached && cachedTime) {
                const data = JSON.parse(cached);
                document.getElementById('raw').innerHTML = `📦 Loaded from cache (${cachedTime}): ${cached}`;
                displayData(data, cachedTime);
                console.log('Loaded data from cache');
            }
        } catch (e) {
            console.error('Error loading cache:', e);
        }
    }

    // Load cached data immediately on start
    loadCachedData();

    client.on('connect', () => {
        console.log('MQTT connected');
        document.getElementById('status').innerHTML = '✅ Connected to MQTT broker';
        document.getElementById('status').style.color = '#00ff88';
        
        // Subscribe with option to receive retained message
        client.subscribe(INF_TOPIC, { qos: 0 }, (err, granted) => {
            if (err) {
                console.error('Subscription error:', err);
                document.getElementById('raw').innerHTML = '❌ Error subscribing to topic';
            } else {
                console.log('Successfully subscribed to topic:', INF_TOPIC);
                
                // Check if retained message was received
                // If no new data after 2 seconds, show notification
                setTimeout(() => {
                    if (!lastData) {
                        document.getElementById('raw').innerHTML = '⏳ Waiting for data from device...';
                    }
                }, 2000);
            }
        });
    });
    
    client.on("message", (topic, message) => {
        const rawValue = message.toString();
        const time = new Date().toLocaleTimeString();
        const isRetained = message.retained ? '📌 (retained) ' : '';
        
        console.log('Message received:', topic, rawValue, 'Retained:', message.retained);
        
        // Save to localStorage for quick access on next open
        try {
            localStorage.setItem('lastSensorData', rawValue);
            localStorage.setItem('lastSensorTime', time);
        } catch (e) {
            console.error('Error saving to cache:', e);
        }
        
        document.getElementById('raw').innerHTML = `📨 ${isRetained}Latest message (${time}): ${rawValue}`;
        
        try {
            const data = JSON.parse(rawValue);
            lastData = data;
            lastDataTime = time;
            displayData(data, time);
            
            // If this is a retained message, highlight it
            if (message.retained) {
                document.getElementById('raw').style.backgroundColor = '#f0f7ff';
                setTimeout(() => {
                    document.getElementById('raw').style.backgroundColor = '';
                }, 1000);
            }
            
        } catch (e) {
            console.error('JSON parsing error:', e);
            document.getElementById('raw').innerHTML += '<br>❌ Error: invalid JSON format';
        }
    });
    
    client.on('error', (err) => {
        console.error('MQTT error:', err);
        document.getElementById('status').innerHTML = `❌ Error: ${err.message}`;
        document.getElementById('status').style.color = '#ff4444';
    });
    
    client.on('offline', () => {
        console.log('MQTT disconnected');
        document.getElementById('status').innerHTML = '📴 Disconnected, showing cached data...';
        document.getElementById('status').style.color = '#ffaa00';
    });

    client.on('reconnect', () => {
        console.log('Attempting to reconnect...');
    });
</script>
</body>
</html>
